<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thư Viện Cá Nhân</title>
    <script src="https://code.jquery.com/jquery-4.0.0.js"
        integrity="sha256-9fsHeVnKBvqh3FB2HYu7g2xseAZ5MlN6Kz/qnkASV8U=" crossorigin="anonymous"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-zinc-950 text-zinc-400 p-6 font-sans">
    <div class="max-w-xl mx-auto">
        <header class="mb-12">
            <h1 class="text-3xl font-bold text-white mb-2">My Stories</h1>
            <p class="text-zinc-600 text-sm">Kho lưu trữ nội dung cá nhân.</p>
        </header>

        <div id="story-list" class="space-y-3">
            <div class="animate-pulse bg-zinc-900 h-16 rounded-lg"></div>
        </div>
    </div>

    <script>
        $(function () {
            const $list = $('#story-list');

            // Lấy danh sách từ list.json (thêm timestamp để tránh cache)
            $.getJSON('list.json?v=' + Date.now(), function (data) {
                $list.empty();

                if (!data || data.length === 0) {
                    $list.html('<p class="text-center py-10">Chưa có "tài liệu" nào được tải lên.</p>');
                    return;
                }

                // Sắp xếp: Truyện mới cập nhật lên đầu
                data.sort((a, b) => b.timestamp - a.timestamp);

                $.each(data, function (i, story) {
                    const itemHtml = `
                        <a href="./${story.slug}/" class="group block p-4 bg-zinc-900/50 hover:bg-zinc-800 border border-zinc-900 hover:border-zinc-700 rounded-xl transition-all">
                            <div class="flex justify-between items-center">
                                <h3 class="text-zinc-100 font-medium group-hover:text-blue-400 transition-colors">${story.title}</h3>
                                <span class="text-[10px] text-zinc-600 uppercase tracking-widest">${story.date}</span>
                            </div>
                        </a>`;
                    $list.append(itemHtml);
                });
            }).fail(function () {
                $list.html('<p class="text-red-900">Không tìm thấy list.json. Hãy chạy builder.py trước.</p>');
            });
        });
    </script>
</body>

</html>
