<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thư Viện Truyện</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-zinc-950 text-zinc-300 p-6">
    <div class="max-w-xl mx-auto">
        <h1 class="text-2xl font-bold text-white mb-8 border-b border-zinc-800 pb-4">Danh Sách Truyện</h1>
        <div id="story-list" class="space-y-4">
            <p class="text-zinc-600">Đang tải danh sách...</p>
        </div>
    </div>

    <script>
        $(document).ready(function () {
            // Đọc file list.json (do Python tạo ra)
            $.getJSON('list.json', function (data) {
                $('#story-list').empty();
                if (data.length === 0) {
                    $('#story-list').html('<p>Chưa có truyện nào.</p>');
                    return;
                }

                // Sắp xếp truyện mới nhất lên đầu
                data.sort((a, b) => b.timestamp - a.timestamp);

                $.each(data, function (i, item) {
                    const link = `
                        <a href="./${item.slug}/" class="block p-4 bg-zinc-900 hover:bg-zinc-800 rounded-lg border border-zinc-800 transition-colors">
                            <div class="text-zinc-100 font-medium">${item.title}</div>
                            <div class="text-xs text-zinc-500 mt-1">Cập nhật: ${item.date}</div>
                        </a>`;
                    $('#story-list').append(link);
                });
            }).fail(function () {
                $('#story-list').html('<p class="text-red-500">Lỗi: Không tìm thấy file list.json</p>');
            });
        });
    </script>
</body>

</html>
