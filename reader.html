<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reading...</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-950 text-zinc-400 font-sans p-4">
    <div class="max-w-2xl mx-auto">
        <a href="../" class="text-zinc-600 text-sm">← Quay lại danh sách</a>
        <h1 id="title" class="text-2xl font-bold text-zinc-100 my-6"></h1>
        <div id="content" class="space-y-8 text-lg leading-relaxed"></div>
    </div>
    <script>
        async function load() {
            try {
                const res = await fetch('./data.json');
                const data = await res.json();
                document.title = data.title;
                document.getElementById('title').innerText = data.title;
                
                // Decode Base64 cho kín tiếng
                const decode = (str) => decodeURIComponent(escape(atob(str)));
                
                document.getElementById('content').innerHTML = data.content.map(item => `
                    <div class="border-b border-zinc-900 pb-6">
                        <p class="text-xs text-zinc-700 italic mb-2">${decode(item.cn)}</p>
                        <p class="text-zinc-200">${decode(item.vi)}</p>
                    </div>
                `).join('');
            } catch(e) { document.getElementById('content').innerText = "Không thể tải dữ liệu."; }
        }
        load();
    </script>
</body>
</html>
