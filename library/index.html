<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thư Viện Truyện</title>
    <link rel="stylesheet" href="../css/styles.css">
    <style>
        body { font-family: Arial, sans-serif; background-color: #09090b; color: #e4e4e7; margin: 0; padding: 0; }
        .library-container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .library-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 15px; }
        .search-box { flex: 1; min-width: 250px; max-width: 400px; position: relative; }
        .search-box input { width: 100%; padding: 10px 15px; border-radius: 8px; border: 1px solid #27272a; background-color: #18181b; color: #fff; outline: none; }
        .tabs { display: flex; gap: 10px; }
        .tab-btn { padding: 8px 16px; background-color: #27272a; color: #a1a1aa; border: none; border-radius: 6px; cursor: pointer; transition: 0.3s; }
        .tab-btn.active, .tab-btn:hover { background-color: #3b82f6; color: #fff; }
        .story-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
        .story-card { background-color: #18181b; border-radius: 8px; padding: 15px; border: 1px solid #27272a; transition: transform 0.2s, border-color 0.2s; text-decoration: none; color: inherit; display: flex; flex-direction: column; }
        .story-card:hover { transform: translateY(-5px); border-color: #3b82f6; }
        .story-title { font-size: 1.1em; font-weight: bold; margin: 0 0 10px 0; color: #fff; }
        .story-meta { font-size: 0.85em; color: #a1a1aa; margin-top: auto; }
        .bookmark-badge { display: inline-block; background: #eab308; color: #000; font-size: 0.7em; padding: 2px 6px; border-radius: 4px; margin-bottom: 8px; font-weight: bold; width: fit-content; }
    </style>
</head>
<body>
    <div id="header-container"></div>
    <main class="library-container">
        <div class="library-header">
            <h2>📚 Thư Viện Truyện</h2>
            <div style="display: flex; gap: 10px;">
                <button class="tab-btn" style="background:#10b981; color:#fff;" onclick="location.href='../builder.py'">➕ Thêm Truyện Mới</button>
                <button class="tab-btn" style="background:#3b82f6; color:#fff;" onclick="location.href='editor.html'">➕ Thêm Chapter</button>
            </div>
            <div class="search-box"><input type="text" id="searchInput" placeholder="🔍 Tìm kiếm truyện..."></div>
            <div class="tabs">
                <button class="tab-btn active" id="tabAll">Tất cả truyện</button>
                <button class="tab-btn" id="tabBookmarks">🔖 Đã đánh dấu (Bookmarks)</button>
            </div>
        </div>
        <div class="story-grid" id="storyGrid"></div>
        <div id="noResults" style="display: none; text-align: center; color: #71717a; padding: 40px;">Không tìm thấy truyện nào.</div>
    </main>
    <script>
        let allStories = [];
        let bookmarkedSlugs = JSON.parse(localStorage.getItem('bookmarked_stories') || '[]');
        let currentTab = 'all';
        const storyGrid = document.getElementById('storyGrid');
        const searchInput = document.getElementById('searchInput');
        const noResults = document.getElementById('noResults');
        const tabAll = document.getElementById('tabAll');
        const tabBookmarks = document.getElementById('tabBookmarks');

        async function loadStories() {
            try {
                const response = await fetch('./list.json');
                if (response.ok) {
                    allStories = await response.json();
                    // Sắp xếp theo timestamp giảm dần (truyện mới nhất / mới cập nhật nhất lên đầu)
                    allStories.sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));
                }
                renderStories();
            } catch (error) { console.error('Lỗi khi tải:', error); }
        }

        function renderStories() {
            storyGrid.innerHTML = '';
            const query = searchInput.value.toLowerCase().trim();
            let filtered = allStories.filter(story => {
                const matchesSearch = story.title.toLowerCase().includes(query);
                const isBookmarked = bookmarkedSlugs.includes(story.slug);
                if (currentTab === 'bookmarks') return matchesSearch && isBookmarked;
                return matchesSearch;
            });
            if (filtered.length === 0) { noResults.style.display = 'block'; }
            else {
                noResults.style.display = 'none';
                filtered.forEach(story => {
                    const isBookmarked = bookmarkedSlugs.includes(story.slug);
                    const card = document.createElement('a');
                    card.href = './' + story.slug + '/';
                    card.className = 'story-card';
                    let badgeHtml = isBookmarked ? '<span class="bookmark-badge">🔖 Đã lưu</span>' : '';
                    card.innerHTML = badgeHtml + '<h3 class="story-title">' + story.title + '</h3><div class="story-meta">📅 Cập nhật: ' + (story.date || 'Chưa rõ') + '</div>';
                    storyGrid.appendChild(card);
                });
            }
        }

        searchInput.addEventListener('input', renderStories);
        tabAll.addEventListener('click', () => { currentTab = 'all'; tabAll.classList.add('active'); tabBookmarks.classList.remove('active'); renderStories(); });
        tabBookmarks.addEventListener('click', () => { currentTab = 'bookmarks'; tabBookmarks.classList.add('active'); tabAll.classList.remove('active'); renderStories(); });
        loadStories();
    </script>
</body>
</html>
