<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reader Pro</title>
    <script src="https://code.jquery.com/jquery-4.0.0.js"
        integrity="sha256-9fsHeVnKBvqh3FB2HYu7g2xseAZ5MlN6Kz/qnkASV8U=" crossorigin="anonymous"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #09090b;
        }

        .active {
            background-color: #1d4ed8 !important;
            border-color: #3b82f6 !important;
            color: white !important;
        }

        .cn-text {
            color: #71717a;
            font-style: italic;
            font-size: 0.9rem;
            margin-bottom: 0.25rem;
        }

        .vi-text {
            color: #e4e4e7;
            font-size: 1.1rem;
            line-height: 1.7;
        }

        /* Điều khiển hiển thị bằng Class tại Body */
        body.mode-vi .cn-text {
            display: none;
        }

        body.mode-cn .vi-text {
            display: none;
        }
    </style>
</head>

<body class="text-zinc-400 pb-20 mode-vi">
    <div class="sticky top-0 z-50 bg-zinc-950/80 backdrop-blur-md border-b border-zinc-800 p-3">
        <div class="max-w-2xl mx-auto">
            <div class="flex items-center justify-between mb-2">
                <a href="../" class="text-xs text-zinc-500 hover:text-zinc-300">← Quay lại</a>
                <span id="title" class="text-sm font-medium text-zinc-200 truncate ml-4">Đang tải...</span>
            </div>
            <!-- Top Pagination -->
            <div class="flex items-center justify-between gap-2 mt-2" id="paginationTop">
                <a id="prevBtnTop" href="#" class="hidden flex-1 text-center py-1.5 px-3 bg-zinc-900 hover:bg-zinc-800 border border-zinc-800 rounded-lg text-xs font-medium text-zinc-300 transition-colors">← Chương trước</a>
                <a id="homeBtnTop" href="../" class="flex-1 text-center py-1.5 px-3 bg-zinc-900 hover:bg-zinc-800 border border-zinc-800 rounded-lg text-xs font-medium text-zinc-300 transition-colors">Trang chủ</a>
                <a id="nextBtnTop" href="#" class="hidden flex-1 text-center py-1.5 px-3 bg-blue-600 hover:bg-blue-700 text-white rounded-lg text-xs font-medium transition-colors">Chương sau →</a>
            </div>
        </div>
    </div>

    <div class="max-w-2xl mx-auto p-4 mt-4">
        <div id="content" class="space-y-6"></div>
        
        <!-- Bottom Pagination -->
        <div class="border-t border-zinc-800 pt-8 mt-12 mb-6">
            <div class="flex items-center justify-between gap-4" id="pagination">
                <a id="prevBtn" href="#" class="hidden flex-1 text-center py-2.5 px-4 bg-zinc-900 hover:bg-zinc-800 border border-zinc-800 rounded-lg text-sm font-medium text-zinc-300 transition-colors">← Đọc chương trước</a>
                <a id="homeBtn" href="../" class="flex-1 text-center py-2.5 px-4 bg-zinc-900 hover:bg-zinc-800 border border-zinc-800 rounded-lg text-sm font-medium text-zinc-300 transition-colors">Về trang chủ truyện</a>
                <a id="nextBtn" href="#" class="hidden flex-1 text-center py-2.5 px-4 bg-blue-600 hover:bg-blue-700 text-white rounded-lg text-sm font-medium transition-colors">Đọc trang sau →</a>
            </div>
        </div>
    </div>

    <!-- Floating Scroll to Top button under bottom-left corner -->
    <button id="scrollToTopBtn" class="fixed bottom-6 left-6 z-50 p-3 rounded-full bg-zinc-900 hover:bg-zinc-800 border border-zinc-800 text-zinc-300 hover:text-white shadow-lg transition-all transform scale-0 cursor-pointer">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-5 h-5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M4.5 10.5 12 3m0 0 7.5 7.5M12 3v18" />
        </svg>
    </button>

    <script>
        $(function () {
            const $body = $('body');
            const $content = $('#content');
            const $scrollToTopBtn = $('#scrollToTopBtn');

            // Hàm giải mã Unicode Base64 an toàn bằng TextDecoder + NFC Normalization
            const decode = (str) => {
                try {
                    const binString = atob(str);
                    const len = binString.length;
                    const bytes = new Uint8Array(len);
                    for (let i = 0; i < len; i++) {
                        bytes[i] = binString.charCodeAt(i);
                    }
                    const decodedText = new TextDecoder('utf-8').decode(bytes);
                    return decodedText.normalize('NFC');
                } catch (err) {
                    console.error("Lỗi giải mã Base64:", err);
                    return "[Lỗi giải mã]";
                }
            };

            // Load dữ liệu
            $.getJSON('./data.json', function (data) {
                $('#title').text(data.title);

                let html = data.content.map(item => `
                    <div class="story-block border-l-2 border-transparent hover:border-blue-900 pl-4 transition-all">
                        <p class="cn-text">${decode(item.cn)}</p>
                        <p class="vi-text">${decode(item.vi)}</p>
                    </div>
                `).join('');

                $content.html(html);

                // Xử lý Pagination động
                setupPagination();
            }).fail(() => $content.html('<p class="text-red-500">Lỗi: Không tìm thấy data.json</p>'));

            // Floating Button Scroll to Top
            $(window).on('scroll', function () {
                if ($(window).scrollTop() > 300) {
                    $scrollToTopBtn.removeClass('scale-0').addClass('scale-100');
                } else {
                    $scrollToTopBtn.removeClass('scale-100').addClass('scale-0');
                }
            });

            $scrollToTopBtn.on('click', function () {
                window.scrollTo({ top: 0, behavior: 'smooth' });
            });

            function setupPagination() {
                try {
                    const pathParts = window.location.pathname.split('/').filter(Boolean);
                    let chapterId = '';
                    let storyId = '';
                    
                    if (pathParts.length > 0) {
                        const lastPart = pathParts[pathParts.length - 1];
                        if (lastPart.endsWith('.html')) {
                            chapterId = pathParts[pathParts.length - 2];
                            storyId = pathParts[pathParts.length - 3];
                        } else {
                            chapterId = pathParts[pathParts.length - 1];
                            storyId = pathParts[pathParts.length - 2];
                        }
                    }

                    if (storyId && chapterId) {
                        $.getJSON('../../list.json', function (list) {
                            const story = list.find(s => s.slug === storyId);
                            if (story && story.chapters) {
                                const chapters = story.chapters;
                                const currentIdx = chapters.findIndex(c => c.id === chapterId);
                                
                                if (currentIdx !== -1) {
                                    // Đọc chương trước
                                    if (currentIdx > 0) {
                                        const prevChap = chapters[currentIdx - 1];
                                        const prevUrl = `../${prevChap.id}/`;
                                        $('#prevBtn').attr('href', prevUrl).removeClass('hidden');
                                        $('#prevBtnTop').attr('href', prevUrl).removeClass('hidden');
                                    }
                                    
                                    // Đọc trang sau
                                    if (currentIdx < chapters.length - 1) {
                                        const nextChap = chapters[currentIdx + 1];
                                        const nextUrl = `../${nextChap.id}/`;
                                        $('#nextBtn').attr('href', nextUrl).removeClass('hidden');
                                        $('#nextBtnTop').attr('href', nextUrl).removeClass('hidden');
                                    }
                                }
                            }
                        });
                    }
                } catch (err) {
                    console.error("Lỗi khi tải pagination:", err);
                }
            }
        });
    </script>
</body>

</html>
